<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Weather app</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="page-container">
    <div class="header">
      <img src="assets/images/logo.svg" />
      <select>
        <img src="assets/images/icon-units.svg" />
        <option>Units</option>
        <img src="assets/images/icon-dropdown.svg" />
      </select>
    </div>
    <!-- Switch to Imperial/Metric

    Temperature

    Celsius (°C)
    Fahrenheit (°F)

    Wind Speed

    km/h
    mph

    Precipitation

    Millimeters (mm)
    Inches (in) -->
    <div class="banner">
      <h1>How's the sky looking today?</h1>
      <form action="#">
        <input placeholder="Search for a city, e.g., New York" />
        <button>Search</button>
      </form>

    </div>

    <div class="forecast">
      <div class="place-info">
        <h3>Berlin, Germany</h3>
        <p>Sunday, Jun 28, 2026</p>
      </div>
      <div class="weather-info">
        <img src="assets/images/icon-sunny.webp" />
        <h3>20°</h3>
      </div>

    </div>
    <!-- Feels like -->
    <!-- Insert temperature here -->

    <!-- Humidity -->
    <!-- Insert humidity here -->

    <!-- Wind -->
    <!-- Insert wind here -->

    <!-- Precipitation -->
    <!-- Insert precipitation here -->

    <!-- Daily forecast -->
    <!-- Insert daily forecast for the next 7 days here -->

    <!-- Hourly forecast -->
    <!-- Insert hourly forecast for the selected day here -->

  </div>
  <script src="script.js"></script>
</body>

</html>
