<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet">

  <title>Weather app</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="page-container">
    <div class="header">
      <img src="assets/images/logo.svg" />
      <select name="units">
        <option value="cel" selected>Celsius (°C)</option>
        <option value="fah">Fahrenheit (°F)</option>
        <img src="assets/images/icon-dropdown.svg" />
      </select>
    </div>

    <div class="banner">
      <h1>How's the sky looking today?</h1>
      <form>
        <input placeholder="Search for a city, e.g., New York" />
        <button type="submit">Search</button>
      </form>
    </div>

    <div class="forecast">
      <div class="place-info">
        <h3 class="timezone">Berlin, Germany</h3>
        <p class="date-time">Sunday, Jun 28, 2026</p>
      </div>
      <div class="weather-info">
        <img class="icon" src="assets/images/icon-sunny.webp" />
        <h3 class="degree">20</h3>
      </div>
    </div>

  </div>
  <script src="script.js"></script>
</body>

</html>
